<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form with flex</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <form>
      <div class="form">
        <div class="header">
          <h1>CREATE AN ACCOUNT</h1>
          <p>We always keep your name and email address private.</p>
        </div>

        <div class="input-text">
          <input type="text" placeholder="First name" class="input" />
          <input type="text" placeholder="Last name" class="input" />
          <input type="text" placeholder="Display Name" class="input" />
          <input type="email" placeholder="Email Address" class="input" />
          <input type="password" placeholder="Password" class="input" />
          <input
            type="password"
            placeholder="Password Confirmation"
            class="input"
          />
        </div>

        <div class="input-radio">
          <div class="radio">
            <div class="radio-button">
              <input type="radio" id="buyer" name="join" />
              <label for="buyer">Join As a Buyer</label>
            </div>
            <p class="paragph">
              I am looking for a Name, Logo or Tagline for my business, brand or
              production.
            </p>
          </div>

          <div class="radio">
            <div class="radio-button">
              <input type="radio" id="seller" name="join" />
              <label for="seller">
                Join As a Creative or Marketplace Seller
              </label>
            </div>
            <p class="paragph">
              I plan to submit name ideas, Logo designs or sell names in Domain
              Marketplace
            </p>
          </div>
        </div>

        <div class="input-checkbox">
          <input type="checkbox" id="allow" />
          <label for="allow"
            >Allow Squadhelp to send marketing/promotional offers from time to
            time</label
          >
        </div>
        <input type="submit" value="Create account" class="button" />
      </div>
    </form>
  </body>
</html>
